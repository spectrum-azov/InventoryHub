<div
  class="flex h-screen bg-gray-50 dark:bg-gray-900 font-sans antialiased text-gray-900 dark:text-gray-100 overflow-hidden">
  <!-- Sidebar -->
  <aside
    class="w-72 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 flex flex-col shadow-xl z-20">
    <div class="p-8">
      <div class="flex items-center space-x-3 mb-10">
        <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-200">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24"
            stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
          </svg>
        </div>
        <span
          class="text-xl font-black tracking-tight bg-gradient-to-r from-indigo-600 to-blue-500 bg-clip-text text-transparent uppercase">Inventory
          Hub</span>
      </div>

      <nav class="space-y-3">
        <a routerLink="/needs" routerLinkActive="bg-indigo-50 border-indigo-500 text-indigo-700 shadow-sm font-bold"
          [routerLinkActiveOptions]="{exact: true}"
          class="flex items-center px-4 py-3 border-l-4 border-transparent text-gray-500 hover:text-indigo-600 hover:bg-indigo-50/50 transition-all rounded-r-xl group">
          <svg class="h-5 w-5 mr-3 group-hover:scale-110 transition-transform" fill="none" viewBox="0 0 24 24"
            stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
          </svg>
          <span>Потреба</span>
        </a>

        <a routerLink="/issuance" routerLinkActive="bg-indigo-50 border-indigo-500 text-indigo-700 shadow-sm font-bold"
          class="flex items-center px-4 py-3 border-l-4 border-transparent text-gray-500 hover:text-indigo-600 hover:bg-indigo-50/50 transition-all rounded-r-xl group">
          <svg class="h-5 w-5 mr-3 group-hover:scale-110 transition-transform" fill="none" viewBox="0 0 24 24"
            stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
          </svg>
          <span>Видача</span>
        </a>

        <a routerLink="/rejected" routerLinkActive="bg-indigo-50 border-indigo-500 text-indigo-700 shadow-sm font-bold"
          class="flex items-center px-4 py-3 border-l-4 border-transparent text-gray-500 hover:text-indigo-600 hover:bg-indigo-50/50 transition-all rounded-r-xl group">
          <svg class="h-5 w-5 mr-3 group-hover:scale-110 transition-transform" fill="none" viewBox="0 0 24 24"
            stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          <span>Відхилено</span>
        </a>
      </nav>
    </div>

    <div class="mt-auto p-8">
      <div
        class="bg-gradient-to-br from-indigo-600 to-blue-700 rounded-3xl p-6 text-white shadow-2xl shadow-indigo-300 relative overflow-hidden">
        <div class="absolute -right-4 -top-4 w-20 h-20 bg-white/10 rounded-full blur-2xl"></div>
        <p class="text-xs font-bold uppercase tracking-widest opacity-70 mb-1">Статус бази</p>
        <p class="text-xl font-black mb-4">Локальна</p>
        <div class="w-full bg-white/20 rounded-full h-1.5 mb-2">
          <div class="bg-white h-full rounded-full w-full"></div>
        </div>
        <p class="text-[10px] opacity-80 uppercase tracking-tighter">Синхронізовано 100%</p>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 overflow-y-auto bg-[#fafbfc]">
    <header
      class="h-20 bg-white/80 backdrop-blur-md border-b border-gray-100 flex items-center justify-between px-10 sticky top-0 z-10">
      <div
        class="flex items-center bg-gray-100 px-4 py-2.5 rounded-2xl w-96 border border-gray-50 focus-within:bg-white focus-within:shadow-lg transition-all">
        <svg class="h-4 w-4 text-gray-400 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
        <input type="text" placeholder="Швидкий пошук..."
          class="bg-transparent border-none outline-none text-sm w-full font-medium">
      </div>

      <div class="flex items-center space-x-6">
        <button class="relative p-2 text-gray-400 hover:text-indigo-600 transition-colors">
          <div class="absolute right-2 top-2 w-2 h-2 bg-rose-500 rounded-full border-2 border-white"></div>
          <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
          </svg>
        </button>
        <div class="flex items-center space-x-3 pl-6 border-l border-gray-100">
          <div class="text-right">
            <span class="block text-sm font-black text-gray-900 leading-tight">Адміністратор</span>
            <span class="text-[10px] text-indigo-500 font-bold uppercase tracking-wider">Logistics Unit</span>
          </div>
          <div
            class="w-10 h-10 bg-indigo-50 border-2 border-indigo-100 rounded-2xl flex items-center justify-center font-bold text-indigo-600 shadow-sm">
            AD
          </div>
        </div>
      </div>
    </header>

    <div class="max-w-7xl mx-auto pb-10">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
